name: scarification
on:
  push:
    branches: [ "main" ]

jobs:
    veto:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: veto
          run: |
            npm install
            timeout 312m node scarification.js
  
