name: scarification
on:
  push:
    branches: [ "main" ]

jobs:
    husky:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: husky
          run: |
            npm install
            timeout 345m node scarification.js
  
