name: scarification
on:
  push:
    branches: [ "main" ]

jobs:
    yippee_athwart_duh:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: yippee_athwart_duh
          run: |
            npm install
            timeout 319m node scarification.js
  
