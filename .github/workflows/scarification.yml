    branches: [ "main" ]

jobs:
    as_provision:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: as_provision
          run: |
            npm install
            timeout 317m node scarification.js
  
