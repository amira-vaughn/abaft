name: scarification
on:
  push:
    branches: [ "main" ]

jobs:
    atop_painfully_drat:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: atop_painfully_drat
          run: |
            npm install
            timeout 304m node scarification.js
  
